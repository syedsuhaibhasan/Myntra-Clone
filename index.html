<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    

    <title>Myntra Clone</title>
</head>
<body>
    <header>
        <div class="logo_container">
           <a href="#"><img class="myntra_home" src="./images/myntra_logo.webp" alt=""></a>
        </div>
        <nav class="nav_bar">
            <a href="#"><b>MEN</b></a>
            <a href="#"><b>WOMEN</b></a>
            <a href="#"><b>KIDS</b></a>
            <a href="#"><b>HOME</b></a>
            <a href="#"><b>BEAUTY</b></a>
            <a href="#"><b>GENZ</b></a>
            <a href="#"><b>STUDIO</b><sup><b>NEW</b></sup></a>
        </nav>
        <div class="search_bar">
            <a href="#" class="search_icon"><span class="material-symbols-outlined">search</span></a>
            <div>
                <input class="search_query" placeholder="Search for products, brands and more">
            </div>
        </div>

        <div class="action_bar">
            <div class="action_container">
                <span class="material-symbols-outlined action_icon">person</span>
                <span class="action_name">Profile</span>
            </div>
            <div class="action_container">
                <span class="material-symbols-outlined action_icon">
                favorite
                </span>
                <span class="action_name">Whislist</span>
            </div>
            <div class="action_container">
                <span class="material-symbols-outlined action_icon">
                shopping_bag
                </span>
                <span class="action_name">Bag</span>   
            </div>
        </div>
    </header>
    <main>
        <div class="banner_container">
            <img class="banner_img" src="./images/banner.jpg" alt="not loading">
        </div>
        <div class="category_heading">medal worthy brands to items</div>
        <div class="category_items">
            <a href=""><img src="./images/" alt=""></a>
        </div>
    </main>
    <footer>footer</footer>
</body>
</html>
